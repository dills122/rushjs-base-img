name: docker-publish

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - master
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  DOCKERHUB_SLUG: dills122/rushjs-base-img
  GHCR_SLUG: ghcr.io/dills122/rushjs-base-img

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - node_version: '16'
            target: dev
            distro: alpine
            distro_tag: alpine
            legacy: 'true'
          - node_version: '16'
            target: prod
            distro: alpine
            distro_tag: alpine
            legacy: 'true'
          - node_version: '18'
            target: dev
            distro: alpine
            distro_tag: alpine
            legacy: 'true'
          - node_version: '18'
            target: prod
            distro: alpine
            distro_tag: alpine
            legacy: 'true'
          - node_version: '20'
            target: dev
            distro: alpine
            distro_tag: alpine
            legacy: 'false'
          - node_version: '20'
            target: prod
            distro: alpine
            distro_tag: alpine
            legacy: 'false'
          - node_version: '20'
            target: dev
            distro: bookworm-slim
            distro_tag: slim
            legacy: 'false'
          - node_version: '20'
            target: prod
            distro: bookworm-slim
            distro_tag: slim
            legacy: 'false'
          - node_version: '22'
            target: dev
            distro: alpine
            distro_tag: alpine
            legacy: 'false'
          - node_version: '22'
            target: prod
            distro: alpine
            distro_tag: alpine
            legacy: 'false'
          - node_version: '22'
            target: dev
            distro: bookworm-slim
            distro_tag: slim
            legacy: 'false'
          - node_version: '22'
            target: prod
            distro: bookworm-slim
            distro_tag: slim
            legacy: 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_SLUG }}
            ${{ env.GHCR_SLUG }}
          tags: |
            type=raw,value=node${{ matrix.node_version }}-${{ matrix.target }}-${{ matrix.distro_tag }}
            type=raw,value=node${{ matrix.node_version }}-${{ matrix.target }},enable=${{ matrix.distro == 'alpine' }}
            type=raw,value=legacy-node${{ matrix.node_version }}-${{ matrix.target }},enable=${{ matrix.legacy == 'true' && matrix.distro == 'alpine' }}
            type=raw,value=lts-${{ matrix.target }},enable=${{ matrix.node_version == '22' && matrix.distro == 'alpine' }}
            type=raw,value=latest,enable=${{ matrix.node_version == '22' && matrix.target == 'prod' && matrix.distro == 'alpine' }}
            type=sha,format=short,prefix=sha-,suffix=-node${{ matrix.node_version }}-${{ matrix.target }}-${{ matrix.distro_tag }}
            type=semver,pattern={{version}}-node${{ matrix.node_version }}-${{ matrix.target }}-${{ matrix.distro_tag }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_VERSION=${{ matrix.node_version }}
            DISTRO=${{ matrix.distro }}
            INSTALL_BASH=${{ matrix.target == 'dev' && 'true' || 'false' }}
            INSTALL_GIT=${{ matrix.target == 'dev' && 'true' || 'false' }}
            INSTALL_CURL=${{ matrix.target == 'dev' && 'true' || 'false' }}
            INSTALL_JQ=${{ matrix.target == 'dev' && 'true' || 'false' }}
            INSTALL_RUSH=${{ matrix.target == 'dev' && 'true' || 'false' }}
            INSTALL_PM2=${{ matrix.target == 'dev' && 'true' || 'false' }}
            INSTALL_NEST=${{ matrix.target == 'dev' && 'true' || 'false' }}
            INSTALL_PNPM=${{ matrix.target == 'dev' && 'true' || 'false' }}
            INSTALL_YARN=false
